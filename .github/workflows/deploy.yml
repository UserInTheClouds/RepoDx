name: Deploy to VPS Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Frontend
        working-directory: ./Frontend
        env:
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
        run: |
          npm install
          npm run build


      - name: Deploy Compiled Frontend via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "Frontend/dist"
          target: "~/apps/project/RepoDx"

      - name: Execute Server Updates Over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # We must enter the actual RepoDx folder where git is cloned
            cd ~/apps/project/RepoDx
            
            echo "Fetching latest codebase"
            git pull origin main
            
            echo "Re-building Nodejs"
            cd Backend
            npm install
            npx prisma generate
            npx prisma migrate deploy
            pm2 restart node-backend --update-env
            
            echo "Updating Python Dependencies"
            cd ../backend-python
            source venv/bin/activate
            pip install -r requirements.txt
            pm2 restart python-backend --update-env
            
            echo "Production Deployment Finished."
